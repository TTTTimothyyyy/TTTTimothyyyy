<svg width="1200" height="190" viewBox="0 0 1200 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Niche-based scrolling skills carousels">
  <defs>
    <style>
      .title { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #9ca3af; letter-spacing: 0.3px; }
      .chipText { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #e5e7eb; dominant-baseline: middle; }
      .dark { fill: #111827; }
      .blue { fill: #2563eb; }
      .orange { fill: #ea580c; }
      .cyan { fill: #0891b2; }
      .violet { fill: #6d28d9; }
    </style>

    <clipPath id="trackClip">
      <rect x="160" y="0" width="1020" height="190" />
    </clipPath>

    <linearGradient id="fadeL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d1117" stop-opacity="1"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#0d1117" stop-opacity="1"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Static niche labels -->
  <text class="title" x="16" y="34">DEV TOOLING</text>
  <text class="title" x="16" y="90">GAME DEVELOPMENT</text>
  <text class="title" x="16" y="146">CREATIVE + CLOUD</text>

  <!-- Row separators -->
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#1f2937" stroke-width="1"/>
  <line x1="0" y1="112" x2="1200" y2="112" stroke="#1f2937" stroke-width="1"/>

  <g clip-path="url(#trackClip)">
    <!-- ========================= -->
    <!-- ROW 1: DEV TOOLING -->
    <!-- strip width = 1600 -->
    <!-- ========================= -->
    <g transform="translate(160 18)">
      <!-- strip A -->
      <g transform="translate(0 0)">
        <rect class="dark"   x="0"   y="0" rx="7" ry="7" width="128" height="30"/><text class="chipText" x="64"  y="15" text-anchor="middle">GitHub Copilot</text>
        <rect class="dark"   x="140" y="0" rx="7" ry="7" width="84"  height="30"/><text class="chipText" x="182" y="15" text-anchor="middle">GitHub</text>
        <rect class="orange" x="236" y="0" rx="7" ry="7" width="58"  height="30"/><text class="chipText" x="265" y="15" text-anchor="middle">Git</text>
        <rect class="blue"   x="306" y="0" rx="7" ry="7" width="92"  height="30"/><text class="chipText" x="352" y="15" text-anchor="middle">VS Code</text>
        <rect class="violet" x="410" y="0" rx="7" ry="7" width="126" height="30"/><text class="chipText" x="473" y="15" text-anchor="middle">Visual Studio</text>
        <rect class="dark"   x="548" y="0" rx="7" ry="7" width="86"  height="30"/><text class="chipText" x="591" y="15" text-anchor="middle">C# / .NET</text>
        <rect class="blue"   x="646" y="0" rx="7" ry="7" width="96"  height="30"/><text class="chipText" x="694" y="15" text-anchor="middle">WPF / XAML</text>
        <rect class="orange" x="754" y="0" rx="7" ry="7" width="84"  height="30"/><text class="chipText" x="796" y="15" text-anchor="middle">Postman</text>
        <rect class="blue"   x="850" y="0" rx="7" ry="7" width="70"  height="30"/><text class="chipText" x="885" y="15" text-anchor="middle">Azure</text>
