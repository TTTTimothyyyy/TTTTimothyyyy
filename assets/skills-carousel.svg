        <rect class="cyan"   x="0"   y="0" rx="7" ry="7" width="102" height="30"/><text class="chipText" x="51"  y="15" text-anchor="middle">Photoshop</text>
        <rect class="orange" x="116" y="0" rx="7" ry="7" width="104" height="30"/><text class="chipText" x="168" y="15" text-anchor="middle">Illustrator</text>
        <rect class="orange" x="234" y="0" rx="7" ry="7" width="92"  height="30"/><text class="chipText" x="280" y="15" text-anchor="middle">FL Studio</text>
        <rect class="orange" x="340" y="0" rx="7" ry="7" width="112" height="30"/><text class="chipText" x="396" y="15" text-anchor="middle">3D Modeling</text>
        <rect class="cyan"   x="466" y="0" rx="7" ry="7" width="90"  height="30"/><text class="chipText" x="511" y="15" text-anchor="middle">Animation</text>
        <rect class="blue"   x="570" y="0" rx="7" ry="7" width="90"  height="30"/><text class="chipText" x="615" y="15" text-anchor="middle">HTML/CSS</text>
        <rect class="blue"   x="674" y="0" rx="7" ry="7" width="104" height="30"/><text class="chipText" x="726" y="15" text-anchor="middle">JavaScript</text>
        <rect class="dark"   x="792" y="0" rx="7" ry="7" width="78"  height="30"/><text class="chipText" x="831" y="15" text-anchor="middle">Python</text>
        <rect class="violet" x="884" y="0" rx="7" ry="7" width="120" height="30"/><text class="chipText" x="944" y="15" text-anchor="middle">Blog Community</text>
      </g>

      <animateTransform attributeName="transform" type="translate" from="160 130" to="-1440 130" dur="40s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Edge fades -->
  <rect x="160" y="0" width="48" height="190" fill="url(#fadeL)"/>
  <rect x="1132" y="0" width="48" height="190" fill="url(#fadeR)"/>
</svg>
