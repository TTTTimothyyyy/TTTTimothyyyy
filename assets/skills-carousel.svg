<svg width="1200" height="70" viewBox="0 0 1200 70" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Scrolling skills carousel">
  <rect width="1200" height="70" fill="transparent"/>
  <defs>
    <style>
      .label { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #e5e7eb; }
      .chip-dark { fill: #111827; }
      .chip-blue { fill: #2563eb; }
      .chip-orange { fill: #ea580c; }
      .chip-cyan { fill: #0891b2; }
      .chip-violet { fill: #6d28d9; }
    </style>
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d1117" stop-opacity="1"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#0d1117" stop-opacity="1"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g>
    <g transform="translate(0,0)">
      <g transform="translate(0,12)">
        <rect class="chip-dark" x="0" y="0" rx="8" ry="8" width="165" height="34"/><text class="label" x="16" y="22">GitHub Copilot</text>
        <rect class="chip-dark" x="180" y="0" rx="8" ry="8" width="105" height="34"/><text class="label" x="196" y="22">GitHub</text>
        <rect class="chip-orange" x="300" y="0" rx="8" ry="8" width="70" height="34"/><text class="label" x="322" y="22">Git</text>
        <rect class="chip-blue" x="385" y="0" rx="8" ry="8" width="95" height="34"/><text class="label" x="405" y="22">VS Code</text>
        <rect class="chip-violet" x="495" y="0" rx="8" ry="8" width="130" height="34"/><text class="label" x="512" y="22">Visual Studio</text>
        <rect class="chip-dark" x="640" y="0" rx="8" ry="8" width="85" height="34"/><text class="label" x="660" y="22">Unity</text>
        <rect class="chip-orange" x="740" y="0" rx="8" ry="8" width="100" height="34"/><text class="label" x="760" y="22">Blender</text>
        <rect class="chip-blue" x="855" y="0" rx="8" ry="8" width="95" height="34"/><text class="label" x="875" y="22">DirectX</text>
        <rect class="chip-blue" x="965" y="0" rx="8" ry="8" width="75" height="34"/><text class="label" x="986" y="22">HLSL</text>
        <rect class="chip-cyan" x="1055" y="0" rx="8" ry="8" width="120" height="34"/><text class="label" x="1073" y="22">Photoshop</text>
        <rect class="chip-orange" x="1190" y="0" rx="8" ry="8" width="120" height="34"/><text class="label" x="1208" y="22">Illustrator</text>
        <rect class="chip-orange" x="1325" y="0" rx="8" ry="8" width="95" height="34"/><text class="label" x="1345" y="22">FL Studio</text>
        <rect class="chip-orange" x="1435" y="0" rx="8" ry="8" width="95" height="34"/><text class="label" x="1455" y="22">Postman</text>
        <rect class="chip-blue" x="1545" y="0" rx="8" ry="8" width="80" height="34"/><text class="label" x="1566" y="22">Azure</text>
      </g>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-820 0" dur="20s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(820,0)">
      <g transform="translate(0,12)">
        <rect class="chip-dark" x="0" y="0" rx="8" ry="8" width="165" height="34"/><text class="label" x="16" y="22">GitHub Copilot</text>
        <rect class="chip-dark" x="180" y="0" rx="8" ry="8" width="105" height="34"/><text class="label" x="196" y="22">GitHub</text>
        <rect class="chip-orange" x="300" y="0" rx="8" ry="8" width="70" height="34"/><text class="label" x="322" y="22">Git</text>
        <rect class="chip-blue" x="385" y="0" rx="8" ry="8" width="95" height="34"/><text class="label" x="405" y="22">VS Code</text>
        <rect class="chip-violet" x="495" y="0" rx="8" ry="8" width="130" height="34"/><text class="label" x="512" y="22">Visual Studio</text>
        <rect class="chip-dark" x="640" y="0" rx="8" ry="8" width="85" height="34"/><text class="label" x="660" y="22">Unity</text>
        <rect class="chip-orange" x="740" y="0" rx="8" ry="8" width="100" height="34"/><text class="label" x="760" y="22">Blender</text>
        <rect class="chip-blue" x="855" y="0" rx="8" ry="8" width="95" height="34"/><text class="label" x="875" y="22">DirectX</text>
        <rect class="chip-blue" x="965" y="0" rx="8" ry="8" width="75" height="34"/><text class="label" x="986" y="22">HLSL</text>
        <rect class="chip-cyan" x="1055" y="0" rx="8" ry="8" width="120" height="34"/><text class="label" x="1073" y="22">Photoshop</text>
        <rect class="chip-orange" x="1190" y="0" rx="8" ry="8" width="120" height="34"/><text class="label" x="1208" y="22">Illustrator</text>
        <rect class="chip-orange" x="1325" y="0" rx="8" ry="8" width="95" height="34"/><text class="label" x="1345" y="22">FL Studio</text>
        <rect class="chip-orange" x="1435" y="0" rx="8" ry="8" width="95" height="34"/><text class="label" x="1455" y="22">Postman</text>
        <rect class="chip-blue" x="1545" y="0" rx="8" ry="8" width="80" height="34"/><text class="label" x="1566" y="22">Azure</text>
      </g>
      <animateTransform attributeName="transform" type="translate" from="820 0" to="0 0" dur="20s" repeatCount="indefinite"/>
    </g>
  </g>

  <rect x="0" y="0" width="48" height="70" fill="url(#fadeLeft)"/>
  <rect x="1152" y="0" width="48" height="70" fill="url(#fadeRight)"/>
</svg>
