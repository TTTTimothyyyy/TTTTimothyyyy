        <rect class="orange" x="116" y="0" rx="7" ry="7" width="104" height="30"/><text class="chipText" x="168" y="15" text-anchor="middle">Illustrator</text>
        <rect class="orange" x="234" y="0" rx="7" ry="7" width="92"  height="30"/><text class="chipText" x="280" y="15" text-anchor="middle">FL Studio</text>
        <rect class="orange" x="340" y="0" rx="7" ry="7" width="112" height="30"/><text class="chipText" x="396" y="15" text-anchor="middle">3D Modeling</text>
        <rect class="cyan"   x="466" y="0" rx="7" ry="7" width="90"  height="30"/><text class="chipText" x="511" y="15" text-anchor="middle">Animation</text>
        <rect class="blue"   x="570" y="0" rx="7" ry="7" width="90"  height="30"/><text class="chipText" x="615" y="15" text-anchor="middle">HTML/CSS</text>
