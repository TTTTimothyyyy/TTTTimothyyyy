<svg width="1200" height="72" viewBox="0 0 1200 72" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Scrolling skills carousel">
  <defs>
    <style>
      .t { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #e5e7eb; dominant-baseline: middle; }
      .dark { fill: #111827; }
      .blue { fill: #2563eb; }
      .orange { fill: #ea580c; }
      .cyan { fill: #0891b2; }
      .violet { fill: #6d28d9; }
    </style>
    <linearGradient id="fadeL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d1117" stop-opacity="1"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#0d1117" stop-opacity="1"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Clip viewport so only center strip is visible -->
  <clipPath id="clip">
    <rect x="0" y="0" width="1200" height="72"/>
  </clipPath>

  <g clip-path="url(#clip)">
    <!--
      One strip width = 2012px exactly.
      Second strip starts at +2012 so there is no collision or gap.
    -->
    <g transform="translate(0 0)">
      <!-- strip A -->
      <g transform="translate(0 0)">
        <rect class="orange" x="0" y="20" rx="7" ry="7" width="70" height="30"/><text class="t" x="35" y="35" text-anchor="middle">Blender</text>
        <rect class="dark" x="82" y="20" rx="7" ry="7" width="128" height="30"/><text class="t" x="146" y="35" text-anchor="middle">GitHub Copilot</text>
        <rect class="dark" x="222" y="20" rx="7" ry="7" width="76" height="30"/><text class="t" x="260" y="35" text-anchor="middle">GitHub</text>
        <rect class="orange" x="310" y="20" rx="7" ry="7" width="50" height="30"/><text class="t" x="335" y="35" text-anchor="middle">Git</text>
        <rect class="blue" x="372" y="20" rx="7" ry="7" width="78" height="30"/><text class="t" x="411" y="35" text-anchor="middle">VS Code</text>
        <rect class="violet" x="462" y="20" rx="7" ry="7" width="104" height="30"/><text class="t" x="514" y="35" text-anchor="middle">Visual Studio</text>
        <rect class="dark" x="578" y="20" rx="7" ry="7" width="62" height="30"/><text class="t" x="609" y="35" text-anchor="middle">Unity</text>
        <rect class="orange" x="652" y="20" rx="7" ry="7" width="70" height="30"/><text class="t" x="687" y="35" text-anchor="middle">Blender</text>
        <rect class="blue" x="734" y="20" rx="7" ry="7" width="72" height="30"/><text class="t" x="770" y="35" text-anchor="middle">DirectX</text>
        <rect class="blue" x="818" y="20" rx="7" ry="7" width="58" height="30"/><text class="t" x="847" y="35" text-anchor="middle">HLSL</text>
        <rect class="cyan" x="888" y="20" rx="7" ry="7" width="92" height="30"/><text class="t" x="934" y="35" text-anchor="middle">Photoshop</text>
        <rect class="orange" x="992" y="20" rx="7" ry="7" width="88" height="30"/><text class="t" x="1036" y="35" text-anchor="middle">Illustrator</text>
        <rect class="orange" x="1092" y="20" rx="7" ry="7" width="76" height="30"/><text class="t" x="1130" y="35" text-anchor="middle">FL Studio</text>
        <rect class="orange" x="1180" y="20" rx="7" ry="7" width="70" height="30"/><text class="t" x="1215" y="35" text-anchor="middle">Postman</text>
        <rect class="blue" x="1262" y="20" rx="7" ry="7" width="64" height="30"/><text class="t" x="1294" y="35" text-anchor="middle">Azure</text>
        <rect class="dark" x="1338" y="20" rx="7" ry="7" width="82" height="30"/><text class="t" x="1379" y="35" text-anchor="middle">C# / .NET</text>
        <rect class="blue" x="1432" y="20" rx="7" ry="7" width="86" height="30"/><text class="t" x="1475" y="35" text-anchor="middle">WPF / XAML</text>
        <rect class="dark" x="1530" y="20" rx="7" ry="7" width="92" height="30"/><text class="t" x="1576" y="35" text-anchor="middle">Game Design</text>
        <rect class="orange" x="1634" y="20" rx="7" ry="7" width="86" height="30"/><text class="t" x="1677" y="35" text-anchor="middle">3D Modeling</text>
        <rect class="cyan" x="1732" y="20" rx="7" ry="7" width="86" height="30"/><text class="t" x="1775" y="35" text-anchor="middle">Animation</text>
        <rect class="blue" x="1830" y="20" rx="7" ry="7" width="78" height="30"/><text class="t" x="1869" y="35" text-anchor="middle">DirectX</text>
        <rect class="dark" x="1920" y="20" rx="7" ry="7" width="92" height="30"/><text class="t" x="1966" y="35" text-anchor="middle">Workflow Dev</text>
      </g>

      <!-- strip B (exact duplicate, offset by exact strip width = 2012) -->
      <g transform="translate(2012 0)">
        <rect class="orange" x="0" y="20" rx="7" ry="7" width="70" height="30"/><text class="t" x="35" y="35" text-anchor="middle">Blender</text>
        <rect class="dark" x="82" y="20" rx="7" ry="7" width="128" height="30"/><text class="t" x="146" y="35" text-anchor="middle">GitHub Copilot</text>
        <rect class="dark" x="222" y="20" rx="7" ry="7" width="76" height="30"/><text class="t" x="260" y="35" text-anchor="middle">GitHub</text>
        <rect class="orange" x="310" y="20" rx="7" ry="7" width="50" height="30"/><text class="t" x="335" y="35" text-anchor="middle">Git</text>
        <rect class="blue" x="372" y="20" rx="7" ry="7" width="78" height="30"/><text class="t" x="411" y="35" text-anchor="middle">VS Code</text>
        <rect class="violet" x="462" y="20" rx="7" ry="7" width="104" height="30"/><text class="t" x="514" y="35" text-anchor="middle">Visual Studio</text>
        <rect class="dark" x="578" y="20" rx="7" ry="7" width="62" height="30"/><text class="t" x="609" y="35" text-anchor="middle">Unity</text>
        <rect class="orange" x="652" y="20" rx="7" ry="7" width="70" height="30"/><text class="t" x="687" y="35" text-anchor="middle">Blender</text>
        <rect class="blue" x="734" y="20" rx="7" ry="7" width="72" height="30"/><text class="t" x="770" y="35" text-anchor="middle">DirectX</text>
        <rect class="blue" x="818" y="20" rx="7" ry="7" width="58" height="30"/><text class="t" x="847" y="35" text-anchor="middle">HLSL</text>
        <rect class="cyan" x="888" y="20" rx="7" ry="7" width="92" height="30"/><text class="t" x="934" y="35" text-anchor="middle">Photoshop</text>
        <rect class="orange" x="992" y="20" rx="7" ry="7" width="88" height="30"/><text class="t" x="1036" y="35" text-anchor="middle">Illustrator</text>
        <rect class="orange" x="1092" y="20" rx="7" ry="7" width="76" height="30"/><text class="t" x="1130" y="35" text-anchor="middle">FL Studio</text>
        <rect class="orange" x="1180" y="20" rx="7" ry="7" width="70" height="30"/><text class="t" x="1215" y="35" text-anchor="middle">Postman</text>
        <rect class="blue" x="1262" y="20" rx="7" ry="7" width="64" height="30"/><text class="t" x="1294" y="35" text-anchor="middle">Azure</text>
        <rect class="dark" x="1338" y="20" rx="7" ry="7" width="82" height="30"/><text class="t" x="1379" y="35" text-anchor="middle">C# / .NET</text>
        <rect class="blue" x="1432" y="20" rx="7" ry="7" width="86" height="30"/><text class="t" x="1475" y="35" text-anchor="middle">WPF / XAML</text>
        <rect class="dark" x="1530" y="20" rx="7" ry="7" width="92" height="30"/><text class="t" x="1576" y="35" text-anchor="middle">Game Design</text>
        <rect class="orange" x="1634" y="20" rx="7" ry="7" width="86" height="30"/><text class="t" x="1677" y="35" text-anchor="middle">3D Modeling</text>
        <rect class="cyan" x="1732" y="20" rx="7" ry="7" width="86" height="30"/><text class="t" x="1775" y="35" text-anchor="middle">Animation</text>
        <rect class="blue" x="1830" y="20" rx="7" ry="7" width="78" height="30"/><text class="t" x="1869" y="35" text-anchor="middle">DirectX</text>
        <rect class="dark" x="1920" y="20" rx="7" ry="7" width="92" height="30"/><text class="t" x="1966" y="35" text-anchor="middle">Workflow Dev</text>
      </g>

      <!-- Smooth infinite scroll -->
      <animateTransform
        attributeName="transform"
        type="translate"
        from="0 0"
        to="-2012 0"
        dur="38s"
        repeatCount="indefinite" />
    </g>
  </g>

  <!-- Soft edge fade -->
  <rect x="0" y="0" width="52" height="72" fill="url(#fadeL)"/>
  <rect x="1148" y="0" width="52" height="72" fill="url(#fadeR)"/>
</svg>
