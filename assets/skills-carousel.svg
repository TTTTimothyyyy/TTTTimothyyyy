      <stop offset="0" stop-color="#0b1220" stop-opacity="1"/>
      <stop offset="1" stop-color="#0b1220" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#0b1220" stop-opacity="1"/>
      <stop offset="1" stop-color="#0b1220" stop-opacity="0"/>
